<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pedidos para Entrega</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            padding-top: 20px;
        }
        .order-card {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background-color: #f9f9f9;
        }
        .order-card h5 {
            color: #28a745;
        }
        .order-item {
            border-top: 1px dashed #eee;
            padding-top: 10px;
            margin-top: 10px;
        }
        .order-item:first-child {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }
        .item-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            margin-right: 10px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">Pedidos Prontos para Entrega</h2>
        <div id="delivery-orders-container">
            <!-- Orders will be loaded here -->
            <p>Carregando pedidos...</p>
        </div>
    </div>

    <script src="js/admin_delivery.js"></script>
</body>
</html>
