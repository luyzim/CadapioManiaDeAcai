<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mania de Açaí – Meus Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-[#0b0316] text-white">
  <!-- BG Decorativo -->
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-32 h-80 w-80 rounded-full bg-purple-700/30 blur-[120px]"></div>
    <div class="absolute top-20 right-0 h-[30rem] w-[30rem] rounded-full bg-fuchsia-600/25 blur-[140px]"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-indigo-500/20 blur-[120px]"></div>
  </div>

  <!-- Header -->
  <header class="mx-auto w-full max-w-7xl px-6 py-6">
    <div class="flex items-center justify-between gap-4">
      <a href="/home" class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-purple-600 to-fuchsia-600 shadow-lg shadow-fuchsia-900/30">
          <span class="text-xl font-black">Aç</span>
        </div>
        <div>
          <h1 class="text-xl font-bold leading-tight md:text-2xl">Mania de Açaí</h1>
          <p class="text-sm text-white/70">Seus Pedidos</p>
        </div>
      </a>

      <nav class="hidden items-center gap-2 sm:flex">
        <a href="/home" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Catálogo</a>
        <a href="/carrinho" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Carrinho</a>
        <a href="#" onclick="logout()" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Sair</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="mx-auto w-full max-w-4xl px-6 pb-20">
    <h2 class="text-2xl font-bold text-white/90 mb-6">Meus Pedidos</h2>
    
    <div id="orders-list" class="space-y-4">
      <!-- Pedidos serão inseridos aqui -->
      <p class="text-white/70">Carregando seus pedidos...</p>
    </div>
  </main>

  <script>
    const ordersList = document.getElementById('orders-list');
    const API_TOKEN_KEY = 'token'; // Key for client token

    function getApiHeaders() {
        const token = localStorage.getItem(API_TOKEN_KEY);
        return {
            'Content-Type': 'application/json',
            'x-authorization': `Bearer ${token}`
        };
    }

    function redirectToLogin() {
        window.location.href = '/login.html';
    }

    function logout() {
        localStorage.removeItem(API_TOKEN_KEY);
        redirectToLogin();
    }

    async function fetchMyOrders() {
        const token = localStorage.getItem(API_TOKEN_KEY);
        if (!token) {
            alert('Você precisa estar logado para ver seus pedidos.');
            redirectToLogin();
            return;
        }

        try {
            const res = await fetch('/api/client/my-orders', { headers: getApiHeaders() });
            if (res.status === 401) {
                alert('Sessão expirada ou não autorizada. Por favor, faça login novamente.');
                logout();
                return;
            }
            if (!res.ok) throw new Error('Falha ao buscar seus pedidos.');
            const orders = await res.json();
            renderOrders(orders);
        } catch (err) {
            ordersList.innerHTML = `<p class="text-red-400">${err.message}</p>`;
        }
    }

    function renderOrders(orders) {
        ordersList.innerHTML = '';
        if (orders.length === 0) {
            ordersList.innerHTML = '<p class="text-white/70">Você ainda não fez nenhum pedido.</p>';
            return;
        }

        orders.forEach(order => {
            const orderEl = document.createElement('div');
            orderEl.className = 'rounded-2xl border border-white/10 bg-white/5 p-4';
            orderEl.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold">Pedido #${order.id}</h3>
                        <p class="text-sm text-white/70">Mesa: ${order.customer_table || 'N/A'}</p>
                        <p class="text-sm text-white/70">Cliente: ${order.customer_name || 'N/A'}</p>
                        <p class="text-sm text-white/70">Total: R$ ${(order.total_cents / 100).toFixed(2)}</p>
                        <p class="text-sm text-white/70">Data: ${new Date(order.created_at).toLocaleString('pt-BR')}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-semibold text-fuchsia-300">${order.status}</p>
                        <a href="/pedido.html?id=${order.id}" class="mt-2 inline-block rounded-full border border-white/10 px-3 py-1 text-xs text-white/70 hover:bg-white/10">Ver Detalhes</a>
                    </div>
                </div>
            `;
            ordersList.appendChild(orderEl);
        });
    }

    document.addEventListener('DOMContentLoaded', fetchMyOrders);
  </script>
</body>
</html>
