<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Mania de Açaí</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .top-nav {
      background-color: #330050;
      padding: 0.5rem 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    .top-nav a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .top-nav a:hover {
      background-color: #4a0072;
    }
  </style>
</head>
<body class="bg-[#0b0316] text-white">
  <div class="min-h-screen">
    <!-- Fundo decorativo -->
    <div class="pointer-events-none fixed inset-0 -z-10">
      <div class="absolute -top-40 -left-32 h-80 w-80 rounded-full bg-purple-700/30 blur-[120px]"></div>
      <div class="absolute top-20 right-0 h-96 w-96 rounded-full bg-fuchsia-600/25 blur-[120px]"></div>
      <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-indigo-500/20 blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-6 py-6">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-purple-600 to-fuchsia-600 shadow-lg shadow-fuchsia-900/30">
          <span class="text-xl font-black">Aç</span>
        </div>
        <div>
          <h1 class="text-xl font-bold leading-tight md:text-2xl">Mania de Açaí</h1>
          <p class="text-sm text-white/70">Seu carrinho de compras</p>
        </div>
      </div>
    </header>

    <!-- Navigation Bar -->
    <nav class="top-nav">
      <a href="/">Home</a>
      <a href="/cardapio">Cardápio</a>
      <a href="/cart">Carrinho</a>
    </nav>

    <!-- Conteúdo do carrinho -->
    <main id="cart-container" class="mx-auto w-full max-w-4xl px-6 pb-16 pt-6">
      <h2 class="text-2xl font-semibold text-white/90 mb-6">Seu Carrinho</h2>
      <div id="cart-items-container" class="space-y-4">
        <!-- Itens do carrinho serão inseridos aqui -->
      </div>
      <div id="cart-summary" class="mt-8 pt-6 border-t border-white/10">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold">Total do Carrinho:</h3>
          <span id="cart-total-display" class="text-2xl font-bold">R$ 0,00</span>
        </div>
        <a href="/checkout" class="w-full block text-center rounded-xl bg-gradient-to-r from-green-500 to-teal-500 px-5 py-3 text-lg font-semibold shadow-lg shadow-green-900/30 hover:opacity-95">Finalizar Pedido</a>
      </div>
    </main>

    <!-- Rodapé -->
    <footer class="border-t border-white/10 bg-black/20 px-6 py-8 text-center text-sm text-white/60">
      © 2025 Mania de Açaí — qualidade artesanal. Feito com ❤.
    </footer>
  </div>

  <script src="/cart.js"></script>
</body>
</html>
