<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mania de Açaí – Carrinho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-[#0b0316] text-white">
  <!-- BG Decorativo -->
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-32 h-80 w-80 rounded-full bg-purple-700/30 blur-[120px]"></div>
    <div class="absolute top-20 right-0 h-[30rem] w-[30rem] rounded-full bg-fuchsia-600/25 blur-[140px]"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-indigo-500/20 blur-[120px]"></div>
  </div>

  <!-- Header -->
  <header class="mx-auto w-full max-w-7xl px-6 py-6">
    <div class="flex items-center justify-between gap-4">
      <a href="/home" class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-purple-600 to-fuchsia-600 shadow-lg shadow-fuchsia-900/30">
          <span class="text-xl font-black">Aç</span>
        </div>
        <div>
          <h1 class="text-xl font-bold leading-tight md:text-2xl">Mania de Açaí</h1>
          <p class="text-sm text-white/70">Seu carrinho</p>
        </div>
      </a>

      <nav class="hidden items-center gap-2 sm:flex">
        <a href="/home" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Catálogo</a>
        <a href="/my-orders" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Meus Pedidos</a>
        <a href="/docs" class="rounded-full border border-white/10 px-4 py-2 text-sm text-white/80 hover:bg-white/10">Docs API</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="mx-auto w-full max-w-7xl px-6 pb-20">
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
      <!-- Lista do carrinho -->
      <section class="lg:col-span-2">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-white/90">Itens do carrinho</h2>
          <button id="clearBtn" class="rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-xs text-white/70 hover:bg-white/10">Esvaziar</button>
        </div>
        <div id="cartList" class="space-y-4"></div>
        <div id="emptyBox" class="hidden mt-6 rounded-2xl border border-white/10 bg-white/5 p-8 text-center text-white/70">
          Seu carrinho está vazio. <a class="text-fuchsia-200 hover:underline" href="/home">Ver catálogo →</a>
        </div>
      </section>

      <!-- Resumo e checkout -->
      <aside class="h-max space-y-4">
        <div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
          <div class="border-b border-white/10 p-4">
            <h3 class="text-base font-semibold">Resumo</h3>
          </div>
          <div class="p-4 space-y-3 text-sm">
            <div class="flex items-center justify-between"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
            <div class="flex items-center justify-between"><span>Taxas</span><span id="fees">R$ 0,00</span></div>
            <div class="flex items-center justify-between text-lg font-semibold text-fuchsia-200">
              <span>Total</span><span id="total">R$ 0,00</span>
            </div>
          </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
          <div class="border-b border-white/10 p-4">
            <h3 class="text-base font-semibold">Identificação</h3>
            <p class="mt-1 text-xs text-white/60">Preencha para finalizar o pedido</p>
          </div>
          <form id="checkoutForm" class="p-4 space-y-3">
            <label class="block text-sm">
              <span class="mb-1 inline-block text-white/80">Seu nome (opcional)</span>
              <input name="customer_name" class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="Ex.: Maria" />
            </label>
            <label class="block text-sm">
              <span class="mb-1 inline-block text-white/80">Mesa / Referência</span>
              <input required name="customer_table" class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="Ex.: Mesa 5" />
            </label>
            <button type="submit" id="sendBtn" class="mt-1 w-full rounded-xl bg-gradient-to-r from-purple-600 to-fuchsia-600 px-5 py-3 text-sm font-semibold shadow-lg shadow-fuchsia-900/30 hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-50">Finalizar pedido</button>
            <p id="hint" class="text-center text-xs text-white/50">O pedido será enviado para a cozinha.</p>
          </form>
        </div>
      </aside>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="pointer-events-none fixed bottom-5 left-1/2 z-[60] hidden -translate-x-1/2">
    <div class="rounded-full border border-white/10 bg-black/70 px-4 py-2 text-sm text-white/90 shadow-xl backdrop-blur">
      <span id="toastMsg">Mensagem</span>
    </div>
  </div>

  <script>
    // Utilitários
    const fmtBRL = (cents=0) => {
      try { return (cents/100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
      catch { return 'R$ ' + (cents/100).toFixed(2).replace('.', ','); }
    };

    const showToast = (msg) => {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 1800);
    };

    // API-based cart functions
    async function fetchCart() {
      try {
        const res = await fetch('/api/cart');
        if (!res.ok) throw new Error('Falha ao buscar o carrinho.');
        return await res.json();
      } catch (e) {
        console.error(e);
        document.getElementById('cartList').innerHTML = `<div class="text-red-400">${e.message}</div>`;
        return [];
      }
    }

    async function updateQty(itemId, quantity) {
      if (quantity <= 0) {
        return await removeItem(itemId);
      }
      try {
        await fetch(`/api/cart/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity })
        });
      } catch (e) {
        console.error('Falha ao atualizar a quantidade:', e);
      }
      render();
    }

    async function removeItem(itemId) {
      try {
        await fetch(`/api/cart/${itemId}`, { method: 'DELETE' });
        showToast('Item removido');
      } catch (e) {
        console.error('Falha ao remover o item:', e);
      }
      render();
    }

    async function clearCart() {
        try {
            await fetch('/api/cart', { method: 'DELETE' });
            showToast('Carrinho esvaziado');
        } catch (e) {
            console.error('Falha ao esvaziar o carrinho:', e);
        }
        render();
    }


    // Renderização
    const cartList = document.getElementById('cartList');
    const emptyBox = document.getElementById('emptyBox');
    const subtotalEl = document.getElementById('subtotal');
    const feesEl = document.getElementById('fees');
    const totalEl = document.getElementById('total');

    async function render() {
      const cart = await fetchCart();
      cartList.innerHTML = '';
      if (!cart.length) {
        emptyBox.classList.remove('hidden');
        subtotalEl.textContent = fmtBRL(0);
        feesEl.textContent = fmtBRL(0);
        totalEl.textContent = fmtBRL(0);
        return;
      }
      emptyBox.classList.add('hidden');

      let subtotal = 0;
      for (const it of cart) {
        const line = it.price_cents * it.quantity;
        subtotal += line;

        const el = document.createElement('div');
        el.className = 'overflow-hidden rounded-2xl border border-white/10 bg-white/5';
        el.innerHTML = `
          <div class="grid grid-cols-[96px,1fr,auto] gap-3 p-3">
            <div class="h-24 w-24 overflow-hidden rounded-xl">
              <img class="h-full w-full object-cover" alt="${it.name}" src="${it.image_url || 'https://picsum.photos/seed/acai/300/300'}"/>
            </div>
            <div>
              <h4 class="text-base font-semibold text-white/95 line-clamp-1">${it.name}</h4>
              <div class="mt-2 flex items-center gap-2">
                <button aria-label="diminuir" data-act="dec" data-item-id="${it.item_id}" data-quantity="${it.quantity}" class="rounded-lg border border-white/10 bg-white/5 px-2 py-1 text-sm hover:bg-white/10">−</button>
                <span class="min-w-[2ch] text-center" data-role="qty">${it.quantity}</span>
                <button aria-label="aumentar" data-act="inc" data-item-id="${it.item_id}" data-quantity="${it.quantity}" class="rounded-lg border border-white/10 bg-white/5 px-2 py-1 text-sm hover:bg-white/10">+</button>
                <button aria-label="remover" data-act="rm" data-item-id="${it.item_id}" class="ml-2 rounded-lg border border-white/10 bg-white/5 px-2 py-1 text-xs text-white/70 hover:bg-white/10">Remover</button>
              </div>
            </div>
            <div class="text-right">
              <div class="text-sm text-white/60">Unitário</div>
              <div class="font-semibold">${fmtBRL(it.price_cents)}</div>
              <div class="mt-1 text-sm text-white/70">Linha: <span data-role="line">${fmtBRL(line)}</span></div>
            </div>
          </div>
        `;

        // actions
        el.querySelector('[data-act="dec"]').addEventListener('click', (e) => {
            const button = e.currentTarget;
            updateQty(button.dataset.itemId, parseInt(button.dataset.quantity) - 1)
        });
        el.querySelector('[data-act="inc"]').addEventListener('click', (e) => {
            const button = e.currentTarget;
            updateQty(button.dataset.itemId, parseInt(button.dataset.quantity) + 1)
        });
        el.querySelector('[data-act="rm"]').addEventListener('click', (e) => removeItem(e.currentTarget.dataset.itemId));

        cartList.appendChild(el);
      }

      const fees = 0; // taxas fixas/serviço se desejar
      const total = subtotal + fees;
      subtotalEl.textContent = fmtBRL(subtotal);
      feesEl.textContent = fmtBRL(fees);
      totalEl.textContent = fmtBRL(total);
    }

    document.getElementById('clearBtn').addEventListener('click', clearCart);

    // Checkout → POST /api/orders
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cart = await fetchCart();
      if (!cart.length) { showToast('Carrinho vazio'); return; }
      const fd = new FormData(e.currentTarget);
      const payload = {
        customer_name: (fd.get('customer_name')||'').trim() || null,
        customer_table: (fd.get('customer_table')||'').trim(),
        items: cart.map(it => ({
          item_id: it.item_id,
          qty: it.quantity
        }))
      };

      const btn = document.getElementById('sendBtn');
      btn.disabled = true; btn.textContent = 'Enviando...';

      try {
        const token = localStorage.getItem('token');
        alert("DEBUG: Token from localStorage: " + token); // DEBUG
        if (!token) {
          throw new Error('Você precisa estar logado para fazer um pedido.');
        }

        const authHeader = `Bearer ${token}`;
        alert("DEBUG: Sending Header -> X-Authorization: " + authHeader); // DEBUG

        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Authorization': authHeader
          },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.error || 'Falha ao enviar pedido');
        }
        
        const json = await res.json();
        // Re-render to clear cart, though we are redirecting away
        render(); 
        showToast('Pedido realizado! Redirecionando...');
        // Redirect to the order status page
        location.href = `/pedido.html?id=${json.id}`;
      } catch (err) {
        console.error(err);
        showToast(err.message || 'Erro ao enviar pedido');
      } finally {
        btn.disabled = false; btn.textContent = 'Finalizar pedido';
      }
    });

    // Primeira renderização
    render();
  </script>
  <script>
    function goToMyOrders() {
      const lastOrderId = localStorage.getItem('acai_last_order_id');
      if (lastOrderId) {
        window.location.href = `/pedido.html?id=${lastOrderId}`;
      } else {
        alert('Nenhum pedido recente encontrado. Faça um pedido primeiro!');
      }
    }
  </script>
</body>
</html>
