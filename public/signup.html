<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mania de Acai - Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#0b0316] text-white">
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-32 h-80 w-80 rounded-full bg-purple-700/30 blur-[120px]"></div>
    <div class="absolute top-20 right-0 h-[30rem] w-[30rem] rounded-full bg-fuchsia-600/25 blur-[140px]"></div>
  </div>

  <header class="mx-auto w-full max-w-7xl px-6 py-6">
    <div class="flex items-center justify-center gap-3">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-purple-600 to-fuchsia-600 shadow-lg shadow-fuchsia-900/30">
        <span class="text-xl font-black">Ac</span>
      </div>
      <div>
        <h1 class="text-xl font-bold leading-tight md:text-2xl">Mania de Acai</h1>
        <p class="text-sm text-white/70">Crie sua conta</p>
      </div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-sm px-6 pb-20">
    <div class="rounded-2xl border border-white/10 bg-white/5 p-8">
      <h2 class="text-center text-2xl font-bold text-white/90">Cadastro</h2>
      <p class="mt-2 text-center text-sm text-white/60">
        O cadastro usa Firebase Authentication para armazenar as credenciais.
      </p>

      <form id="signup-form" class="mt-6 space-y-4" novalidate>
        <div>
          <label for="name" class="mb-1 inline-block text-sm text-white/80">Nome do usuario</label>
          <input type="text" id="name" name="name" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="Seu nome" />
        </div>
        <div>
          <label for="email" class="mb-1 inline-block text-sm text-white/80">Email</label>
          <input type="email" id="email" name="email" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="seu@email.com" />
        </div>
        <div>
          <label for="phone" class="mb-1 inline-block text-sm text-white/80">Numero de telefone</label>
          <input type="tel" id="phone" name="phone" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="(11) 99999-9999" />
        </div>
        <div>
          <label for="password" class="mb-1 inline-block text-sm text-white/80">Senha</label>
          <input type="password" id="password" name="password" required minlength="6" class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" />
        </div>
        <div>
          <label for="confirmPassword" class="mb-1 inline-block text-sm text-white/80">Confirmacao de senha</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" />
        </div>
        <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-fuchsia-600 px-5 py-3 text-sm font-semibold shadow-lg shadow-fuchsia-900/30 hover:opacity-95">
          Cadastrar
        </button>
        <p id="signup-feedback" class="text-center text-sm"></p>
      </form>
    </div>

    <p class="mt-4 text-center text-sm text-white/60">
      Ja tem uma conta?
      <a href="/login" class="text-fuchsia-300 hover:underline">Faca login</a>
    </p>
  </main>

  <script src="/js/email-validator.js"></script>
  <script>
    const signupForm = document.getElementById("signup-form");
    const feedbackEl = document.getElementById("signup-feedback");

    function setFeedback(message, type) {
      feedbackEl.textContent = message;
      feedbackEl.className = `text-center text-sm ${type === "error" ? "text-red-400" : "text-emerald-300"}`;
    }

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = event.target.name.value.trim();
      const email = event.target.email.value.trim().toLowerCase();
      const phone = event.target.phone.value.trim();
      const password = event.target.password.value;
      const confirmPassword = event.target.confirmPassword.value;

      setFeedback("", "success");

      if (!name || !email || !phone || !password || !confirmPassword) {
        setFeedback("Preencha todos os campos obrigatorios.", "error");
        return;
      }

      if (!window.isValidEmail(email)) {
        setFeedback("Informe um e-mail valido.", "error");
        return;
      }

      if (password !== confirmPassword) {
        setFeedback("Senha e confirmacao de senha devem ser iguais.", "error");
        return;
      }

      if (password.length < 6) {
        setFeedback("A senha precisa ter pelo menos 6 caracteres.", "error");
        return;
      }

      try {
        const response = await fetch("/api/client/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            email,
            phone,
            password,
            confirmPassword,
          }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Falha no cadastro.");
        }

        localStorage.setItem("token", data.token);
        window.location.href = "/home.html";
      } catch (error) {
        console.error(error);
        setFeedback(error.message, "error");
      }
    });
  </script>
</body>
</html>
