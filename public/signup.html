<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mania de Açaí – Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#0b0316] text-white">
  <!-- BG Decorativo -->
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-40 -left-32 h-80 w-80 rounded-full bg-purple-700/30 blur-[120px]"></div>
    <div class="absolute top-20 right-0 h-[30rem] w-[30rem] rounded-full bg-fuchsia-600/25 blur-[140px]"></div>
  </div>

  <!-- Header -->
  <header class="mx-auto w-full max-w-7xl px-6 py-6">
    <div class="flex items-center justify-center gap-3">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-purple-600 to-fuchsia-600 shadow-lg shadow-fuchsia-900/30">
        <span class="text-xl font-black">Aç</span>
      </div>
      <div>
        <h1 class="text-xl font-bold leading-tight md:text-2xl">Mania de Açaí</h1>
        <p class="text-sm text-white/70">Crie sua conta</p>
      </div>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="mx-auto w-full max-w-sm px-6 pb-20">
      <div class="rounded-2xl border border-white/10 bg-white/5 p-8">
        <h2 class="text-center text-2xl font-bold text-white/90">Cadastro</h2>
        <form id="signup-form" class="mt-6 space-y-4">
          <div>
            <label for="name" class="mb-1 inline-block text-sm text-white/80">Nome</label>
            <input type="text" id="name" name="name" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="Seu nome" />
          </div>
          <div>
            <label for="email" class="mb-1 inline-block text-sm text-white/80">Email</label>
            <input type="email" id="email" name="email" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" placeholder="seu@email.com" />
          </div>
          <div>
            <label for="password" class="mb-1 inline-block text-sm text-white/80">Senha</label>
            <input type="password" id="password" name="password" required class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 outline-none placeholder:text-white/40 focus:ring-2 focus:ring-purple-600/50" />
          </div>
          <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-purple-600 to-fuchsia-600 px-5 py-3 text-sm font-semibold shadow-lg shadow-fuchsia-900/30 hover:opacity-95">Cadastrar</button>
          <p id="signup-error" class="text-center text-sm text-red-400"></p>
        </form>
      </div>
      <p class="mt-4 text-center text-sm text-white/60">Já tem uma conta? <a href="/login.html" class="text-fuchsia-300 hover:underline">Faça login</a></p>
  </main>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value;
      const email = e.target.email.value;
      const password = e.target.password.value;
      const signupError = document.getElementById('signup-error');
      signupError.textContent = '';

      try {
        const res = await fetch('/api/client/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Falha no cadastro');

        if (data.token) {
          localStorage.setItem('token', data.token);
          window.location.href = '/home.html'; // Redirect to home page
        } else {
            throw new Error('Token não recebido.');
        }
      } catch (err) {
        console.error(err);
        signupError.textContent = err.message;
      }
    });
  </script>
</body>
</html>
